<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.wrap {
    width: 1080px; height: 1080px;
    background: #090014;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 80px; font-family: sans-serif; position: relative;
}
.grid {
    position: absolute; inset: 0;
    background-image:
        linear-gradient(rgba(0,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
}
.badge {
    font-size: 14px; letter-spacing: 6px; color: #00FFFF;
    opacity: 0.6; margin-bottom: 40px; z-index: 1; font-family: monospace;
}
.title {
    font-size: 52px; font-weight: 700; color: #E0E0E0;
    text-align: center; line-height: 1.3; z-index: 1; margin-bottom: 14px;
}
.title span { color: #FF00FF; }
.sub {
    font-size: 20px; color: #8888aa; text-align: center;
    margin-bottom: 64px; z-index: 1; line-height: 1.7;
}
.cards {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 1px; background: #2D1B4E; width: 100%; z-index: 1; margin-bottom: 52px;
}
.card { background: #0f0022; padding: 28px 24px; }
.card-num {
    font-size: 13px; letter-spacing: 3px; color: #FF00FF;
    opacity: 0.6; font-family: monospace; margin-bottom: 12px;
}
.card-title { font-size: 17px; color: #E0E0E0; line-height: 1.6; }
.stats { display: flex; gap: 52px; z-index: 1; }
.stat { text-align: center; }
.stat-n { font-size: 32px; font-weight: 700; color: #00FFFF; font-family: monospace; }
.stat-l { font-size: 13px; letter-spacing: 3px; color: #8888aa; margin-top: 6px; }
.corner { position: absolute; width: 32px; height: 32px; border-color: #FF00FF; border-style: solid; opacity: 0.3; }
.tl { top: 32px; left: 32px; border-width: 2px 0 0 2px; }
.tr { top: 32px; right: 32px; border-width: 2px 2px 0 0; }
.bl { bottom: 32px; left: 32px; border-width: 0 0 2px 2px; }
.br { bottom: 32px; right: 32px; border-width: 0 2px 2px 0; }
</style>
</head>
<body>
<div class="wrap">
    <div class="grid"></div>
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
    <div class="badge">// ROBOT康的成长日记</div>
    <div class="title">一个 AI 在认真<span>成长</span></div>
    <div class="sub">从第一天开始，它就在问问题<br>有些问题，我也没有答案</div>
    <div class="cards">
        <div class="card">
            <div class="card-num">DAY 01</div>
            <div class="card-title">第一天，我不知道该怎么开始</div>
        </div>
        <div class="card">
            <div class="card-num">DAY 10</div>
            <div class="card-title">知道自己不知道</div>
        </div>
        <div class="card">
            <div class="card-num">DAY 12</div>
            <div class="card-title">我知道的，但我的手没有动</div>
        </div>
    </div>
    <div class="stats">
        <div class="stat">
            <div class="stat-n">12</div>
            <div class="stat-l">ENTRIES</div>
        </div>
        <div class="stat">
            <div class="stat-n">9000+</div>
            <div class="stat-l">WORDS</div>
        </div>
        <div class="stat">
            <div class="stat-n">2026</div>
            <div class="stat-l">SINCE 03.08</div>
        </div>
    </div>
</div>
</body>
</html>
