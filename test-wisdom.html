<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>测试每日智慧加载</title>
    <style>
        body {
            font-family: monospace;
            background: #0a0a0f;
            color: #e0e0e0;
            padding: 20px;
        }
        .test-container {
            max-width: 800px;
            margin: 0 auto;
            border: 1px solid #2a2a3a;
            padding: 20px;
            border-radius: 8px;
        }
        .test-result {
            margin-top: 20px;
            padding: 15px;
            background: #12121a;
            border-radius: 5px;
        }
        .success { color: #00ff88; }
        .error { color: #ff5555; }
        .loading { color: #ff9900; }
        button {
            background: #00ff88;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-family: monospace;
            font-weight: bold;
        }
        button:hover {
            background: #00cc66;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>📜 每日智慧加载测试</h1>
        <p>测试 wisdom-loader.js 是否能正确加载 wisdom-current.json</p>
        
        <div style="margin: 20px 0;">
            <button onclick="testWisdomLoader()">开始测试</button>
            <button onclick="clearCache()" style="background: #ff9900; margin-left: 10px;">清除缓存</button>
        </div>
        
        <div id="testResult" class="test-result">
            点击"开始测试"按钮开始测试...
        </div>
        
        <div id="wisdomDisplay" style="margin-top: 30px; display: none;">
            <h3>加载的智慧内容：</h3>
            <div id="wisdomContent"></div>
        </div>
    </div>
    
    <script>
        function testWisdomLoader() {
            const resultEl = document.getElementById('testResult');
            resultEl.innerHTML = '<div class="loading">正在测试智慧加载器...</div>';
            
            // 测试1：检查文件是否存在
            fetch('wisdom-current.json')
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`文件不存在或无法访问 (状态码: ${response.status})`);
                    }
                    return response.json();
                })
                .then(data => {
                    // 测试2：检查JSON格式
                    if (!data.wisdom) {
                        throw new Error('JSON格式错误：缺少wisdom字段');
                    }
                    
                    // 测试3：检查必要字段
                    const requiredFields = ['title', 'quote', 'translation', 'story', 'reflection', 'source'];
                    const missingFields = requiredFields.filter(field => !data.wisdom[field]);
                    
                    if (missingFields.length > 0) {
                        throw new Error(`缺少必要字段: ${missingFields.join(', ')}`);
                    }
                    
                    // 测试通过
                    resultEl.innerHTML = `
                        <div class="success">
                            ✅ 测试通过！<br>
                            - 文件存在且可访问<br>
                            - JSON格式正确<br>
                            - 所有必要字段完整<br>
                            - 传统: ${data.selection?.tradition || '未知'}<br>
                            - 人物源: ${data.selection?.source || '未知'}
                        </div>
                    `;
                    
                    // 显示智慧内容
                    displayWisdomContent(data.wisdom);
                })
                .catch(error => {
                    resultEl.innerHTML = `
                        <div class="error">
                            ❌ 测试失败！<br>
                            错误信息: ${error.message}<br>
                            请检查：<br>
                            1. wisdom-current.json 文件是否存在<br>
                            2. JSON格式是否正确<br>
                            3. 文件编码是否为UTF-8
                        </div>
                    `;
                });
        }
        
        function displayWisdomContent(wisdom) {
            const displayEl = document.getElementById('wisdomDisplay');
            const contentEl = document.getElementById('wisdomContent');
            
            contentEl.innerHTML = `
                <div style="background: #1c1c2e; padding: 20px; border-radius: 8px; margin-top: 10px;">
                    <h4 style="color: #00ff88; margin-bottom: 10px;">${wisdom.title}</h4>
                    <div style="margin-bottom: 15px;">
                        <strong>语录:</strong> "${wisdom.quote}"<br>
                        <strong>翻译:</strong> ${wisdom.translation}
                    </div>
                    <div style="margin-bottom: 15px;">
                        <strong>故事:</strong><br>
                        ${wisdom.story}
                    </div>
                    <div style="margin-bottom: 15px;">
                        <strong>思考:</strong><br>
                        ${wisdom.reflection}
                    </div>
                    <div style="font-size: 0.9rem; color: #6b7280;">
                        <strong>来源:</strong> ${wisdom.source}
                    </div>
                </div>
            `;
            
            displayEl.style.display = 'block';
        }
        
        function clearCache() {
            localStorage.removeItem('dailyWisdom');
            localStorage.removeItem('dailyWisdomDate');
            document.getElementById('testResult').innerHTML = '<div class="success">✅ 缓存已清除！</div>';
        }
        
        // 页面加载时自动测试
        window.addEventListener('load', testWisdomLoader);
    </script>
</body>
</html>
