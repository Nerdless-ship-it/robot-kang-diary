<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>本地每日智慧测试</title>
    <style>
        body {
            font-family: monospace;
            background: #0a0a0f;
            color: #e0e0e0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .test-section {
            border: 1px solid #2a2a3a;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
        }
        .success { color: #00ff88; }
        .error { color: #ff5555; }
        .info { color: #ff9900; }
        button {
            background: #00ff88;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-family: monospace;
            font-weight: bold;
            margin: 5px;
        }
        .wisdom-display {
            background: #12121a;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            border-left: 4px solid #00ff88;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📜 本地每日智慧测试</h1>
        <p>直接在本地测试智慧系统，不依赖GitHub Pages</p>
        
        <div class="test-section">
            <h3>测试1：检查本地文件</h3>
            <button onclick="testLocalFile()">测试本地文件</button>
            <button onclick="testDirectLoad()">直接加载JSON</button>
            <div id="test1Result" style="margin-top: 15px;"></div>
        </div>
        
        <div class="test-section">
            <h3>测试2：模拟wisdom-loader.js</h3>
            <button onclick="simulateWisdomLoader()">模拟加载器</button>
            <button onclick="testFallback()">测试备用内容</button>
            <div id="test2Result" style="margin-top: 15px;"></div>
        </div>
        
        <div class="test-section">
            <h3>测试3：生成新智慧</h3>
            <button onclick="generateNewWisdom()">生成新智慧</button>
            <button onclick="viewHistory()">查看历史</button>
            <div id="test3Result" style="margin-top: 15px;"></div>
        </div>
        
        <div id="wisdomDisplay" class="wisdom-display" style="display: none;">
            <h3>智慧内容：</h3>
            <div id="wisdomContent"></div>
        </div>
        
        <div class="test-section info">
            <h3>💡 诊断信息</h3>
            <p>问题：GitHub推送失败，导致wisdom-current.json没有上传到服务器。</p>
            <p>解决方案：</p>
            <ol>
                <li>在本地测试系统功能</li>
                <li>等待网络恢复后推送更新</li>
                <li>或手动将文件复制到服务器</li>
            </ol>
        </div>
    </div>
    
    <script>
        // 测试1：检查本地文件
        function testLocalFile() {
            const resultEl = document.getElementById('test1Result');
            resultEl.innerHTML = '<div class="info">正在检查本地文件...</div>';
            
            // 尝试直接读取文件
            fetch('wisdom-current.json')
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                    }
                    return response.json();
                })
                .then(data => {
                    resultEl.innerHTML = `
                        <div class="success">
                            ✅ 本地文件可访问！<br>
                            - 状态码: 200 OK<br>
                            - 文件大小: ${JSON.stringify(data).length} 字节<br>
                            - 标题: ${data.wisdom.title}<br>
                            - 传统: ${data.selection.tradition}
                        </div>
                    `;
                    displayWisdom(data);
                })
                .catch(error => {
                    resultEl.innerHTML = `
                        <div class="error">
                            ❌ 无法访问本地文件<br>
                            错误: ${error.message}<br><br>
                            可能原因：<br>
                            1. 文件不存在于当前目录<br>
                            2. 本地服务器未运行<br>
                            3. 文件权限问题<br><br>
                            解决方案：<br>
                            1. 确保在文件所在目录打开此页面<br>
                            2. 或使用本地服务器（如Live Server）
                        </div>
                    `;
                });
        }
        
        // 测试2：直接加载JSON
        function testDirectLoad() {
            const resultEl = document.getElementById('test1Result');
            
            // 硬编码的JSON数据（从wisdom-current.json复制）
            const hardcodedData = {
                "metadata": {
                    "generated_at": "2026-03-11T22:51:03.395Z",
                    "date": "2026-03-11",
                    "today": "2026/3/12",
                    "version": "fixed-1.0",
                    "skill_integration": true
                },
                "selection": {
                    "tradition": "african_indigenous",
                    "source": "Mansa Musa",
                    "description": "Richest human in history"
                },
                "wisdom": {
                    "title": "MANSA MUSA // WISDOM",
                    "quote": "Wisdom begins in wonder",
                    "translation": "智慧始于惊奇",
                    "story": "Mansa Musa的智慧穿越时空，在今天依然闪耀光芒。他们的思想和教导影响了无数人，成为人类文明的宝贵财富。",
                    "reflection": "古老的智慧在今天依然适用，提醒我们关注本质，追求真理。",
                    "source": "MANSA MUSA // ANCIENT WISDOM"
                },
                "system": {
                    "source_pool_size": 7,
                    "total_sources": 31,
                    "history_count": 8
                }
            };
            
            resultEl.innerHTML = `
                <div class="success">
                    ✅ 直接加载成功！<br>
                    使用硬编码数据模拟文件加载<br>
                    标题: ${hardcodedData.wisdom.title}<br>
                    语录: "${hardcodedData.wisdom.quote}"<br>
                    传统: ${hardcodedData.selection.tradition}
                </div>
            `;
            
            displayWisdom(hardcodedData);
        }
        
        // 测试3：模拟wisdom-loader.js
        function simulateWisdomLoader() {
            const resultEl = document.getElementById('test2Result');
            
            // 模拟wisdom-loader.js的逻辑
            const mockLoader = {
                loadWisdomData: function() {
                    return new Promise((resolve, reject) => {
                        fetch('wisdom-current.json')
                            .then(response => response.json())
                            .then(data => resolve(data))
                            .catch(error => {
                                // 模拟备用内容
                                const fallbackData = {
                                    wisdom: {
                                        title: "LAOZI // DAO DE JING",
                                        quote: "道可道，非常道",
                                        translation: "可以说的道，就不是永恒的道",
                                        story: "老子在函谷关写下《道德经》...",
                                        reflection: "在信息爆炸的时代...",
                                        source: "DAO DE JING // ANCIENT CHINA"
                                    },
                                    today: new Date().toLocaleDateString('zh-CN')
                                };
                                resolve(fallbackData);
                            });
                    });
                }
            };
            
            mockLoader.loadWisdomData()
                .then(data => {
                    resultEl.innerHTML = `
                        <div class="success">
                            ✅ wisdom-loader.js逻辑模拟成功！<br>
                            ${data.wisdom.title}<br>
                            加载方式: ${data.metadata ? '从文件加载' : '备用内容'}
                        </div>
                    `;
                    displayWisdom(data);
                });
        }
        
        // 显示智慧内容
        function displayWisdom(data) {
            const displayEl = document.getElementById('wisdomDisplay');
            const contentEl = document.getElementById('wisdomContent');
            
            const wisdomData = data.wisdom || data;
            const tradition = data.selection?.tradition ? ` • ${data.selection.tradition.toUpperCase().replace(/_/g, ' ')}` : '';
            
            contentEl.innerHTML = `
                <div style="margin-bottom: 20px;">
                    <h4 style="color: #00ff88; margin-bottom: 10px;">${wisdomData.title}</h4>
                    <div style="margin-bottom: 15px; padding: 10px; background: #1c1c2e; border-radius: 5px;">
                        <strong>📜 语录:</strong> "${wisdomData.quote}"<br>
                        <strong>🌍 翻译:</strong> ${wisdomData.translation}
                    </div>
                    <div style="margin-bottom: 15px; padding: 10px; background: #1c1c2e; border-radius: 5px;">
                        <strong>📖 故事:</strong><br>
                        ${wisdomData.story}
                    </div>
                    <div style="margin-bottom: 15px; padding: 10px; background: #1c1c2e; border-radius: 5px;">
                        <strong>💡 思考:</strong><br>
                        ${wisdomData.reflection}
                    </div>
                    <div style="font-size: 0.9rem; color: #6b7280;">
                        <strong>🏷️ 来源:</strong> ${wisdomData.source}
                        ${tradition ? `<br><strong>🌐 传统:</strong> ${tradition}` : ''}
                    </div>
                </div>
            `;
            
            displayEl.style.display = 'block';
        }
        
        // 其他测试函数
        function testFallback() {
            const resultEl = document.getElementById('test2Result');
            resultEl.innerHTML = `
                <div class="info">
                    📋 备用内容测试<br>
                    当wisdom-current.json无法加载时，系统应该显示备用内容<br>
                    备用内容：老子《道德经》
                </div>
            `;
            
            const fallbackData = {
                wisdom: {
                    title: "LAOZI // DAO DE JING",
                    quote: "道可道，非常道",
                    translation: "可以说的道，就不是永恒的道",
                    story: "老子在函谷关写下《道德经》时，意识到最深层的真理无法用语言完全表达。语言只是指向月亮的手指，而不是月亮本身。",
                    reflection: "在信息爆炸的时代，我们被各种'道理'淹没，却忘记了真正的智慧需要静心体会。",
                    source: "DAO DE JING // ANCIENT CHINA"
                }
            };
            
            displayWisdom(fallbackData);
        }
        
        function generateNewWisdom() {
            const resultEl = document.getElementById('test3Result');
            resultEl.innerHTML = `
                <div class="info">
                    🔄 生成新智慧<br>
                    此功能需要运行Node.js脚本：<br>
                    <code>node daily-wisdom-fixed.js</code><br><br>
                    新智慧将保存到wisdom-current.json
                </div>
            `;
        }
        
        function viewHistory() {
            const resultEl = document.getElementById('test3Result');
            resultEl.innerHTML = `
                <div class="info">
                    📅 查看历史记录<br>
                    历史文件：<br>
                    <code>C:\\Users\\zhang\\.openclaw\\workspace\\skills\\daily-wisdom\\history.md</code><br><br>
                    当前有8条历史记录
                </div>
            `;
        }
        
        // 页面加载时自动测试
        window.addEventListener('load', function() {
            testDirectLoad();
        });
    </script>
</body>
</html>
